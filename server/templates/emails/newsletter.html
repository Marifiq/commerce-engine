<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{subject}}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f5f5f5;
        }
        .email-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
        }
        .email-header {
            background-color: #000000;
            color: #ffffff;
            padding: 30px 20px;
            text-align: center;
        }
        .email-header img {
            max-width: 150px;
            height: auto;
            margin-bottom: 15px;
        }
        .email-header h1 {
            font-size: 24px;
            font-weight: bold;
            margin: 0;
        }
        .email-body {
            padding: 40px 30px;
        }
        .email-content {
            color: #333333;
            font-size: 16px;
            line-height: 1.8;
        }
        .email-content h1 {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #000000;
        }
        .email-content h2 {
            font-size: 24px;
            font-weight: bold;
            margin-top: 30px;
            margin-bottom: 15px;
            color: #000000;
        }
        .email-content h3 {
            font-size: 20px;
            font-weight: bold;
            margin-top: 25px;
            margin-bottom: 12px;
            color: #000000;
        }
        .email-content p {
            margin-bottom: 15px;
        }
        .email-content ul,
        .email-content ol {
            margin-bottom: 15px;
            padding-left: 30px;
        }
        .email-content li {
            margin-bottom: 8px;
        }
        .email-content a {
            color: #000000;
            text-decoration: underline;
        }
        .email-content strong {
            font-weight: bold;
            color: #000000;
        }
        .email-content em {
            font-style: italic;
        }
        .email-content code {
            background-color: #f5f5f5;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }
        .email-content pre {
            background-color: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
            margin-bottom: 20px;
        }
        .email-content pre code {
            background-color: transparent;
            padding: 0;
        }
        .email-content blockquote {
            border-left: 4px solid #000000;
            padding-left: 20px;
            margin-left: 0;
            margin-bottom: 20px;
            font-style: italic;
            color: #666666;
        }
        .email-content img {
            max-width: 100%;
            height: auto;
            border-radius: 5px;
            margin: 20px 0;
        }
        .email-content hr {
            border: none;
            border-top: 1px solid #e0e0e0;
            margin: 30px 0;
        }
        .email-footer {
            background-color: #f5f5f5;
            padding: 30px;
            text-align: center;
            font-size: 14px;
            color: #666666;
        }
        .email-footer a {
            color: #000000;
            text-decoration: underline;
        }
        .unsubscribe {
            margin-top: 20px;
            font-size: 12px;
            color: #999999;
        }
    </style>
</head>
<body>
    <div class="email-container">
        <div class="email-header">
            {{#if appIcon}}
            <img src="{{appIcon}}" alt="{{appName}}" />
            {{/if}}
            <h1>{{appName}}</h1>
        </div>
        <div class="email-body">
            <div class="email-content">
                {{content}}
            </div>
        </div>
        <div class="email-footer">
            <p>You are receiving this email because you subscribed to our newsletter.</p>
            <p class="unsubscribe">
                If you no longer wish to receive these emails, please contact us at 
                <a href="mailto:{{supportEmail}}">{{supportEmail}}</a>
            </p>
            <p style="margin-top: 20px;">
                &copy; {{currentYear}} {{appName}}. All rights reserved.
            </p>
        </div>
    </div>
</body>
</html>
